server {
    listen 80;

    # serve collected static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires max;
        add_header Cache-Control "public";
    }

    # optional: serve media if you have any
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires max;
        add_header Cache-Control "public";
    }
}
